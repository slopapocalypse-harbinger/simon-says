<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simon Says: Mindbreaker Odyssey</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header class="topbar glass">
      <div>
        <h1>Simon Says: <span>Mindbreaker Odyssey</span></h1>
        <p class="subtitle">A deep tactical idle-adventure designed to melt your brain (in a good way).</p>
      </div>
      <div class="resource-grid" id="resourceGrid"></div>
    </header>

    <main class="layout">
      <section class="panel glass">
        <h2>Operations</h2>
        <div class="btn-grid" id="actionButtons"></div>

        <h3>Zones</h3>
        <div class="zone-list" id="zoneList"></div>

        <h3>Active Challenge</h3>
        <div class="challenge-box" id="challengeBox"></div>
      </section>

      <section class="panel glass">
        <h2>Mission Feed</h2>
        <div id="eventFeed" class="feed"></div>

        <h3>Quest Board</h3>
        <div id="questBoard" class="quest-board"></div>
      </section>

      <section class="panel glass">
        <h2>Upgrades</h2>
        <div id="upgradeList" class="upgrade-list"></div>

        <h3>Artifacts</h3>
        <div id="artifactList" class="artifact-list"></div>

        <h3>Achievements</h3>
        <div id="achievementList" class="achievement-list"></div>
      </section>
    </main>

    <footer class="glass footer">
      <button id="saveBtn">Save</button>
      <button id="loadBtn">Load</button>
      <button id="hardResetBtn" class="danger">Hard Reset</button>
      <span id="statusText"></span>
    </footer>
  </div>

  <script src="game.js"></script>
</body>
</html>
